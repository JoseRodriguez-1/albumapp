<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mundial 2026" />
  <meta name="description" content="Rastrea tu álbum Panini FIFA World Cup 2026" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="css/app.css" />

  <title>Álbum Mundial 2026</title>
</head>
<body>
  <header class="app-header" id="appHeader">
    <button class="back-btn" id="backBtn" aria-label="Volver" hidden>‹</button>
    <h1 class="app-title" id="appTitle">Mundial 2026</h1>
    <div class="header-spacer"></div>
  </header>

  <main id="screen" class="screen" aria-live="polite"></main>

  <nav class="bottom-nav" role="navigation" aria-label="Navegación principal">
    <button class="nav-btn" data-route="home" aria-label="Resumen">
      <span class="nav-icon">⌂</span>
      <span class="nav-label">Resumen</span>
    </button>
    <button class="nav-btn" data-route="teams" aria-label="Equipos">
      <span class="nav-icon">⚽</span>
      <span class="nav-label">Equipos</span>
    </button>
    <button class="nav-btn" data-route="lists" aria-label="Listas">
      <span class="nav-icon">↔</span>
      <span class="nav-label">Listas</span>
    </button>
    <button class="nav-btn" data-route="stats" aria-label="Estadísticas">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Stats</span>
    </button>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="modalRoot"></div>

  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
